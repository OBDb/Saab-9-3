generations:
  - name: "First Generation (9-3 Type 1)"
    start_year: 1998
    end_year: 2003
    description: "The first-generation Saab 9-3, internally designated as the 9-3 Type 1 (body style 9400), was launched in 1998 for the 1999 model year as a significant development of the Saab 900 (New Generation) introduced in 1994. Built on the GM2900 platform, it received over 1,100 improvements including enhanced safety features, chassis refinements, and interior upgrades. Available as a three or five-door hatchback and a two-door convertible, the 9-3 featured distinctive Saab styling elements like the hockey stick-shaped C-pillar, aircraft-inspired dashboard, and center console-mounted ignition switch. Engine options included naturally aspirated and turbocharged versions of Saab's 2.0-liter and 2.3-liter four-cylinder engines, with power outputs ranging from 130 to 225 horsepower in the Viggen performance model. The high-performance Viggen (named after the Saab 37 Viggen fighter jet) featured unique styling elements, sport suspension, and a 225 horsepower turbocharged engine. Production ended on 8 May 2002 at the Trollhättan plant, with Valmet continuing production until 25 April 2003. A total of 326,370 first-generation 9-3s were built."

  - name: "Second Generation (9-3 Type 2)"
    start_year: 2003
    end_year: 2014
    description: "The second-generation Saab 9-3, internally designated as the 9-3 Type 2, represented a significant departure from Saab tradition by abandoning the hatchback body style in favor of a conventional sedan when it launched in July 2002 for the 2003 model year. Built on GM's Epsilon platform shared with vehicles like the Opel Vectra and Chevrolet Malibu, the new 9-3 featured a more mainstream design while retaining distinctive Saab elements such as the wraparound windshield effect, aircraft-inspired cockpit, and center console-mounted ignition. The model range initially included a four-door sedan and two-door convertible, with a five-door SportCombi wagon added in 2005. Power came primarily from turbocharged four-cylinder engines ranging from 1.8 to 2.8 liters, with outputs from 150 to 280 horsepower in the Turbo X performance model. Despite General Motors' financial troubles and eventual sale of Saab to Spyker Cars in 2010, the 9-3 continued in production until Saab's bankruptcy in 2011. Very limited production resumed under NEVS (National Electric Vehicle Sweden) ownership from December 2013 to May 2014, with the MY14 model featuring updated styling and a 2.0-liter turbocharged engine."

  - name: "Second Generation Facelift (2008)"
    start_year: 2008
    end_year: 2014
    description: "The 2008 model year marked a significant facelift for the second-generation Saab 9-3, with over 2,000 changes introduced. The new frontal styling was inspired by the Saab Aero-X concept car, featuring the first use of LED 'signature' lighting in revised headlamps, a new clamshell bonnet, and clear tail lamps dubbed 'ice block'. Other changes included new door panels, a new rear bumper, and black replacing charcoal gray as an interior color choice. The 2.8T V6 received a mild power boost. The Turbo X performance model was introduced at the 2007 Frankfurt Motor Show, featuring Saab's first production XWD all-wheel drive system, an electronic limited-slip differential, and unique styling in metallic jet black with matte grey trim. A new twin-turbo diesel engine (1.9 TTiD) with 180 PS was also introduced. For the 2012 model year, the car was badged 'Griffin' in most markets with further revisions including improved fuel efficiency, rear badging changes, and new interior trim options. This facelift version continued in production until final NEVS production ended in May 2014."